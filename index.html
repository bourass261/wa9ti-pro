<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wa9ti PRO - وقتي برو</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#333}
.container{max-width:420px;margin:0 auto;padding:20px}
.header{text-align:center;color:white;padding:20px 0}
.header h1{font-size:32px;margin-bottom:5px}
.card{background:white;border-radius:20px;padding:20px;margin:15px 0;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.task-input{display:flex;gap:10px;margin-bottom:15px}
.task-input input{flex:1;padding:12px;border:2px solid #eee;border-radius:12px;font-size:16px}
.btn{background:#667eea;color:white;border:none;padding:12px 20px;border-radius:12px;font-weight:bold;cursor:pointer}
.task{ background:#f8f9ff; padding:12px; border-radius:12px; margin:8px 0; display:flex; justify-content:space-between; align-items:center}
.timer{font-size:48px;text-align:center;font-weight:bold;color:#667eea;margin:20px 0}
.btn-full{width:100%;margin-top:10px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center}
.stat-num{font-size:24px;font-weight:bold;color:#667eea}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>⏰ Wa9ti PRO</h1>
<p>نظم وقتك، حقق أهدافك</p>
</div>

<div class="card">
<h3>➕ مهمة جديدة</h3>
<div class="task-input">
<input id="taskInput" placeholder="شنو بغيتي تدير اليوم؟">
<button class="btn" onclick="addTask()">زيد</button>
</div>
<div id="taskList"></div>
</div>

<div class="card">
<h3>⏱️ مؤقت التركيز</h3>
<div class="timer" id="timer">25:00</div>
<div style="display:flex;gap:10px;justify-content:center">
<button class="btn" onclick="startTimer()">ابدأ</button>
<button class="btn" style="background:#ff6b6b" onclick="resetTimer()">إعادة</button>
</div>
</div>

<div class="card">
<div class="stats">
<div><div class="stat-num" id="doneCount">0</div><div>مهام منجزة</div></div>
<div><div class="stat-num" id="focusTime">0</div><div>دقائق تركيز</div></div>
</div>
</div>

</div>
<script>
let tasks = JSON.parse(localStorage.getItem('wa9ti_tasks')||'[]');
let doneCount = parseInt(localStorage.getItem('wa9ti_done')||'0');
let focusMinutes = parseInt(localStorage.getItem('wa9ti_focus')||'0');
let timerInterval=null; let timeLeft=25*60; let isRunning=false;

function save(){localStorage.setItem('wa9ti_tasks',JSON.stringify(tasks));localStorage.setItem('wa9ti_done',doneCount);localStorage.setItem('wa9ti_focus',focusMinutes);render()}
function render(){
document.getElementById('taskList').innerHTML=tasks.map((t,i)=>`<div class="task"><span>${t.done?'✅':''} ${t.text}</span><button onclick="toggle(${i})" class="btn" style="padding:6px 12px">${t.done?'إلغاء':'تم'}</button></div>`).join('');
document.getElementById('doneCount').textContent=doneCount;
document.getElementById('focusTime').textContent=focusMinutes;
}
function addTask(){let inp=document.getElementById('taskInput');if(!inp.value.trim())return;tasks.push({text:inp.value,done:false});inp.value='';save()}
function toggle(i){if(!tasks[i].done)doneCount++;else doneCount=Math.max(0,doneCount-1);tasks[i].done=!tasks[i].done;save()}
function updateDisplay(){let m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById('timer').textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`}
function startTimer(){if(isRunning)return;isRunning=true;timerInterval=setInterval(()=>{timeLeft--;updateDisplay();if(timeLeft<=0){clearInterval(timerInterval);isRunning=false;focusMinutes+=25;alert('أحسنت! خدي استراحة 5 دقائق 🎉');timeLeft=25*60;updateDisplay();save()}},1000)}
function resetTimer(){clearInterval(timerInterval);isRunning=false;timeLeft=25*60;updateDisplay()}
render();updateDisplay();
</script>
</body>
  </html>
