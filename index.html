<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wa9ti PRO</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:#0a0a12;color:#fff;min-height:100vh}.box{max-width:430px;margin:auto;padding:20px}h1{text-align:center;font-size:38px;background:linear-gradient(90deg,#8b5cff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:20px 0}.card{background:#ffffff14;border:1px solid #ffffff20;border-radius:18px;padding:16px;margin-bottom:14px}input{flex:1;background:#00000066;border:1px solid #ffffff20;padding:12px;border-radius:10px;color:#fff}.row{display:flex;gap:8px}.btn{background:linear-gradient(135deg,#8b5cff,#00e5ff);border:0;padding:12px 16px;border-radius:10px;color:#fff;font-weight:700}.task{background:#ffffff0f;padding:10px;border-radius:10px;display:flex;justify-content:space-between;margin-top:8px}.timer{font-size:60px;font-weight:900;text-align:center}</style></head><body><div class="box"><h1>Wa9ti PRO ✨</h1><div class="card"><div class="row"><input id="i" placeholder="شنو باغي تدير؟"><button class="btn" onclick="A()">+</button></div><div id="L"></div></div><div class="card"><div class="timer" id="T">25:00</div><button class="btn" style="width:100%;margin-top:10px" id="B" onclick="S()">ابدأ التركيز 🔥</button></div></div><script>let a=JSON.parse(localStorage.getItem('w')||'[]'),iv,lf=1500,rn=false;function R(){L.innerHTML='';a.forEach((x,i)=>L.innerHTML+=`<div class=task><span onclick="a[${i}].k=!a[${i}].k;R()">${x.n}</span><b onclick="a.splice(${i},1);R()">✕</b></div>`);localStorage.setItem('w',JSON.stringify(a))}function A(){let v=i.value.trim();if(!v)return;a.unshift({n:v});i.value='';R()}function U(){let m=Math.floor(lf/60),s=lf%60;T.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}function S(){if(rn){clearInterval(iv);rn=false;B.textContent='ابدأ التركيز 🔥';return}rn=true;B.textContent='وقف';iv=setInterval(()=>{lf--;U();if(lf<=0){clearInterval(iv);rn=false;lf=1500;U();alert('برافو كملتي!')}},1000)}R();U()</script></body></html>
